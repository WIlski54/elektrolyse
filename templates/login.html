<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elektrolyse - Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-card">
      <img src="{{ url_for('static', filename='img/logo-gsm-transparent.png') }}" alt="GSM" class="login-logo">
      <p class="eyebrow">Chemie | Elektrochemie</p>
      <h1>Interaktives Arbeitsblatt: Elektrolyse</h1>
      <p class="login-copy">Du vergleichst eine galvanische Zelle mit einer Elektrolysezelle und entwickelst daraus die Grundprinzipien selbst.</p>
      {% if error %}<p class="error-box">{{ error }}</p>{% endif %}
      <form method="post" class="login-form">
        <label for="pseudonym">Pseudonym</label>
        <input id="pseudonym" name="pseudonym" autocomplete="off" required placeholder="z. B. Kupferstern">
        <label for="klasse">Klasse / Kurs</label>
        <input id="klasse" name="klasse" autocomplete="off" required placeholder="z. B. 10a">
        <button class="btn-primary" type="submit">Arbeitsblatt starten</button>
      </form>
      <a href="/lehrer" class="teacher-link">Lehrerbereich</a>
    </section>
  </main>
</body>
</html>
